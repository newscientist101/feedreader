{{define "content"}}
<div class="history-view">
    <div class="page-header">
        <h1>History</h1>
    </div>

    {{if .HistoryArticles}}
    <div class="article-list history-list">
        {{range .HistoryArticles}}
        <a href="/article/{{.ID}}" class="article-row read">
            <div class="article-row-content">
                <div class="article-row-title">{{.Title}}</div>
                <div class="article-row-meta">
                    <span class="feed-name">{{.FeedName}}</span>
                    {{if .Author}}<span class="author">{{deref .Author}}</span>{{end}}
                    <span class="date" data-timestamp="{{formatDate .PublishedAt}}">{{timeAgo .PublishedAt}}</span>
                </div>
            </div>
        </a>
        {{end}}
    </div>

    {{if .HasMore}}
    <div class="load-more">
        <a href="/history?offset={{add .Offset 50}}" class="btn btn-secondary">Load more</a>
    </div>
    {{end}}

    {{else}}
    <div class="empty-state">
        <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor" class="muted-icon">
            <path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
        </svg>
        <h2>No history yet</h2>
        <p>Articles you read will appear here.</p>
    </div>
    {{end}}
</div>
{{end}}
