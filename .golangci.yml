version: "2"

run:
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - nilerr
    - errorlint
    - bodyclose

  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: db/dbgen/
        linters:
          - all
      - path: _test\.go$
        linters:
          - errcheck
          - bodyclose
          - unused
